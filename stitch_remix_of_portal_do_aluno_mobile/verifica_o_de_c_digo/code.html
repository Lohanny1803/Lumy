<body class="bg-background min-h-screen flex flex-col items-center justify-start font-body-md text-on-surface antialiased safe-area-inset">
<!-- TopAppBar (Transactional - Hidden Navigation, just back and title) -->
<header class="flex items-center justify-between w-full px-section-margin py-base bg-background top-0 docked full-width flat no shadows">
<button aria-label="Voltar" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container transition-colors text-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary">Lumy</h1>
<div class="w-10 h-10"></div> <!-- Placeholder for balance -->
</header>
<!-- Main Content Canvas -->
<main class="flex-1 w-full max-w-md px-container-padding pt-8 pb-12 flex flex-col">
<!-- Header Text -->
<div class="mb-8 text-center">
<h2 class="font-headline-lg text-headline-lg text-primary mb-2">Verificar E-mail</h2>
<p class="font-body-lg text-body-lg text-on-surface-variant">Enviamos um código de 4 dígitos para seu e-mail.</p>
</div>
<!-- OTP Input Area -->
<div class="flex-1 flex flex-col justify-start">
<form class="w-full flex flex-col gap-stack-gap" id="otp-form">
<!-- Code Inputs Container -->
<div class="flex justify-center gap-inline-gap mb-6" dir="ltr">
<input aria-label="Dígito 1" class="otp-input w-16 h-20 text-center font-headline-lg text-headline-lg text-primary bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm transition-all focus:border-secondary focus:ring-1 focus:ring-secondary" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text">
<input aria-label="Dígito 2" class="otp-input w-16 h-20 text-center font-headline-lg text-headline-lg text-primary bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm transition-all focus:border-secondary focus:ring-1 focus:ring-secondary" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text">
<input aria-label="Dígito 3" class="otp-input w-16 h-20 text-center font-headline-lg text-headline-lg text-primary bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm transition-all focus:border-secondary focus:ring-1 focus:ring-secondary" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text">
<input aria-label="Dígito 4" class="otp-input w-16 h-20 text-center font-headline-lg text-headline-lg text-primary bg-surface-container-lowest border border-outline-variant rounded-lg shadow-sm transition-all focus:border-secondary focus:ring-1 focus:ring-secondary" inputmode="numeric" maxlength="1" pattern="[0-9]*" type="text">
</div>
<!-- Resend Link -->
<div class="text-center mb-8">
<p class="font-body-md text-body-md text-on-surface-variant">
                        Não recebeu o código? 
                        <a class="font-label-md text-label-md text-secondary hover:text-primary transition-colors underline-offset-2 hover:underline" href="#">Reenviar</a>
</p>
</div>
<!-- Spacer to push button to bottom if needed, but here we keep it tight -->
<div class="mt-auto pt-4">
<!-- Primary Button -->
<button class="w-full bg-[#1a237e] hover:bg-opacity-90 text-on-primary font-headline-sm text-headline-sm py-4 rounded-lg shadow-md transition-all active:scale-[0.98] flex items-center justify-center gap-2" id="verify-btn" type="button">
                        Verificar
                    </button>
</div>
</form>
</div>
</main>
<!-- BottomNavBar Suppressed: Transactional screen -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('.otp-input');
            const verifyBtn = document.getElementById('verify-btn');

            // Auto-focus first input
            if(inputs.length > 0) {
                setTimeout(() => inputs[0].focus(), 100);
            }

            inputs.forEach((input, index) => {
                input.addEventListener('input', (e) => {
                    // Allow only numbers
                    e.target.value = e.target.value.replace(/[^0-9]/g, '');
                    
                    if (e.target.value.length === 1) {
                        // Move to next input if not the last one
                        if (index < inputs.length - 1) {
                            inputs[index + 1].focus();
                        }
                    }
                });

                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Backspace' && e.target.value.length === 0) {
                        // Move to previous input on backspace if current is empty
                        if (index > 0) {
                            inputs[index - 1].focus();
                        }
                    }
                });
                
                // Handle paste event
                input.addEventListener('paste', (e) => {
                    e.preventDefault();
                    const pastedData = e.clipboardData.getData('text').replace(/[^0-9]/g, '').slice(0, 4);
                    
                    if(pastedData) {
                        const digits = pastedData.split('');
                        inputs.forEach((inp, i) => {
                            if(digits[i]) {
                                inp.value = digits[i];
                            }
                        });
                        // Focus the next empty or the last input
                        const nextFocusIndex = Math.min(digits.length, inputs.length - 1);
                        inputs[nextFocusIndex].focus();
                    }
                });
            });

            // Basic button click effect simulation
            verifyBtn.addEventListener('click', function() {
                const code = Array.from(inputs).map(i => i.value).join('');
                if(code.length === 4) {
                    // Simulate loading state
                    const originalText = this.innerHTML;
                    this.innerHTML = '<span class="material-symbols-outlined animate-spin" style="font-variation-settings: \'FILL\' 0, \'wght\' 400, \'GRAD\' 0, \'opsz\' 24;">progress_activity</span> Verificando...';
                    this.classList.add('opacity-80', 'cursor-not-allowed');
                    
                    setTimeout(() => {
                        this.innerHTML = originalText;
                        this.classList.remove('opacity-80', 'cursor-not-allowed');
                        // Reset or redirect logic here
                    }, 1500);
                } else {
                    // Shake animation for invalid
                    const container = document.querySelector('.flex.justify-center.gap-inline-gap');
                    container.classList.add('translate-x-2');
                    setTimeout(() => container.classList.remove('translate-x-2'), 100);
                    setTimeout(() => container.classList.add('-translate-x-2'), 200);
                    setTimeout(() => container.classList.remove('-translate-x-2'), 300);
                }
            });
        });
    </script>
