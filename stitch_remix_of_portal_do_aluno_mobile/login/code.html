<body class="bg-background min-h-screen flex flex-col items-center justify-center p-container-padding antialiased">
<!-- Supressed Navigation: Linear/Transactional Intent -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] p-8 flex flex-col gap-8">
<!-- Header -->
<header class="text-center flex flex-col items-center gap-4">
<div class="w-16 h-16 bg-primary rounded-xl flex items-center justify-center mb-2 shadow-sm">
<span class="material-symbols-outlined text-on-primary text-[32px]" data-icon="school" data-weight="fill" style="font-variation-settings: &quot;FILL&quot; 1;">school</span>
</div>
<div class="flex flex-col gap-2">
<h1 class="font-headline-lg text-headline-lg text-on-surface">Bem-vindo de volta</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Acesse sua conta para continuar seus estudos</p>
</div>
</header>
<!-- Form -->
<form class="flex flex-col gap-stack-gap">
<!-- Email Input -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">E-mail</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors outline-none" id="email" name="email" placeholder="seu@email.com" required="" type="email">
</div>
</div>
<!-- Password Input -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">Senha</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Esqueci minha senha</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-3 border border-outline-variant rounded-lg bg-surface-container-lowest font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors outline-none" id="password" name="password" placeholder="••••••••" required="" type="password">
<button aria-label="Toggle password visibility" class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
</div>
<!-- Submit Button -->
<button class="w-full hover:bg-primary-container text-white font-headline-sm text-headline-sm py-3 rounded-lg shadow-[0_2px_8px_rgba(0,0,0,0.04)] transition-all active:scale-[0.98] mt-2" style="background-color: rgb(26, 35, 126);" type="submit">
                Entrar
            </button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-2">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-body-sm text-body-sm text-on-surface-variant">ou entre com</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Social Login -->
<div class="flex flex-col gap-inline-gap">
<button class="w-full flex items-center justify-center gap-2 bg-surface-container-lowest border border-outline-variant hover:bg-surface-container-low text-on-surface font-headline-sm text-headline-sm py-3 rounded-lg transition-colors" type="button">

                Google
            </button>

</div>
<!-- Footer -->
<footer class="text-center mt-4">
<p class="font-body-md text-body-md text-on-surface-variant">
                Não tem uma conta? 
                <a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors ml-1" href="#">Cadastre-se</a>
</p>

<script>
        // Simple password toggle visibility
        document.addEventListener('DOMContentLoaded', () => {
            const toggleBtns = document.querySelectorAll('[aria-label="Toggle password visibility"]');
            
            toggleBtns.forEach(btn => {
                btn.addEventListener('click', function() {
                    const input = this.previousElementSibling;
                    const icon = this.querySelector('.material-symbols-outlined');
                    
                    if (input.type === 'password') {
                        input.type = 'text';
                        icon.textContent = 'visibility';
                    } else {
                        input.type = 'password';
                        icon.textContent = 'visibility_off';
                    }
                });
            });
        });
    </script>
