<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .ambient-blur {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(119, 209, 255, 0.15) 0%, rgba(238, 252, 255, 0) 70%);
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen relative overflow-x-hidden flex items-center justify-center">
<!-- Ambient Background Effects -->
<div class="ambient-blur top-[-100px] left-[-100px]"></div>
<div class="ambient-blur bottom-[-50px] right-[-100px] opacity-70"></div>
<!-- Main Container -->
<main class="w-full max-w-md px-container-padding py-section-margin relative z-10 flex flex-col justify-center min-h-screen">
<!-- Logo Header -->
<div class="flex flex-col items-center mb-8">
<div class="w-16 h-16 bg-surface-tint flex items-center justify-center shadow-lg shadow-surface-tint/20 mb-6 rounded-lg">
<span class="material-symbols-outlined text-on-primary text-[32px]" style="font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background text-center mb-2 tracking-tight">Criar Conta</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">Junte-se à maior plataforma acadêmica</p>
</div>
<!-- Sign Up Form -->
<form class="flex flex-col gap-stack-gap bg-surface-container-lowest p-6 rounded-2xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border border-surface-variant">
<!-- Nome Completo Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="nome">Nome Completo</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">person</span>
<input class="w-full border border-outline-variant pl-10 pr-[12px] py-3 bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-colors rounded-lg" id="nome" placeholder="Seu nome completo" type="text">
</div>
</div>
<!-- E-mail Institucional Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="email">E-mail Institucional</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">mail</span>
<input class="w-full border border-outline-variant pl-10 pr-[12px] py-3 bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-colors rounded-lg" id="email" placeholder="nome@instituicao.edu.br" type="email">
</div>
</div>
<!-- Senha Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="senha">Senha</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">lock</span>
<input class="w-full border border-outline-variant pl-10 pr-10 py-3 bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-colors rounded-lg" id="senha" placeholder="••••••••" type="password">
<button aria-label="Toggle password visibility" class="absolute right-3 text-on-surface-variant hover:text-surface-tint transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Confirmar Senha Input -->
<div class="flex flex-col gap-1">
<label class="font-label-md text-label-md text-on-surface" for="confirmar-senha">Confirmar Senha</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">lock_reset</span>
<input class="w-full border border-outline-variant pl-10 pr-10 py-3 bg-surface-container-lowest text-on-surface font-body-md text-body-md focus:outline-none focus:border-surface-tint focus:ring-1 focus:ring-surface-tint transition-colors rounded-lg" id="confirmar-senha" placeholder="••••••••" type="password">
<button aria-label="Toggle password visibility" class="absolute right-3 text-on-surface-variant hover:text-surface-tint transition-colors focus:outline-none" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
</div>
<!-- Checkbox Terms -->
<div class="flex items-start gap-3 mt-1">
<div class="flex items-center h-5">
<input class="w-5 h-5 border border-outline-variant rounded bg-surface-container-lowest text-surface-tint focus:ring-surface-tint focus:ring-2 focus:ring-offset-background cursor-pointer" id="termos" type="checkbox">
</div>
<label class="font-body-sm text-body-sm text-on-surface-variant cursor-pointer leading-tight pt-0.5" for="termos">
                    Aceito os <a class="text-surface-tint font-semibold hover:underline" href="#">Termos de Uso</a> e <a class="text-surface-tint font-semibold hover:underline" href="#">Política de Privacidade</a>
</label>
</div>
<!-- Submit Button -->
<button class="w-full text-on-primary font-headline-sm text-headline-sm py-3.5 mt-4 hover:opacity-90 hover:shadow-lg hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2 rounded-lg" style="background-color: rgb(26, 35, 126);" type="submit">
                Criar minha conta
            </button>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                Já tem uma conta? <a class="text-surface-tint font-bold hover:underline ml-1" href="#">Entre agora</a>
</p>
</div>
</main>
<script>
        // Simple JS for toggling password visibility
        document.querySelectorAll('button[aria-label="Toggle password visibility"]').forEach(button => {
            button.addEventListener('click', function() {
                const input = this.previousElementSibling;
                const icon = this.querySelector('.material-symbols-outlined');
                
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.textContent = 'visibility';
                } else {
                    input.type = 'password';
                    icon.textContent = 'visibility_off';
                }
            });
        });
    </script>


</body></html>
